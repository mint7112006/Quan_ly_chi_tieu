<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Chi Tiêu - Nhóm 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <div class="container py-4">
        <h1 class="text-center mb-4 text-primary fw-bold">QUẢN LÝ CHI TIÊU CÁ NHÂN</h1>

        <div class="row mb-4 justify-content-center">
        <div class="col-md-4">
            <div class="card p-2 d-flex flex-row align-items-center gap-3 border-0 shadow-sm" style="border-radius: 20px;">
                <label class="ms-3 fw-bold text-secondary" style="min-width: 80px;">Xem theo:</label>
                <select id="month-filter" class="form-select border-0 bg-light" style="border-radius: 15px;">
                    <option value="all">Tất cả thời gian</option>
                    <option value="0">Tháng 1</option>
                    <option value="1">Tháng 2</option>
                    <option value="2">Tháng 3</option>
                    <option value="3">Tháng 4</option>
                    <option value="4">Tháng 5</option>
                    <option value="5">Tháng 6</option>
                    <option value="6">Tháng 7</option>
                    <option value="7">Tháng 8</option>
                    <option value="8">Tháng 9</option>
                    <option value="9">Tháng 10</option>
                    <option value="10">Tháng 11</option>
                    <option value="11">Tháng 12</option>
                </select>
            </div>
        </div>
    </div>


        <div class="row text-center mb-2">
            <div class="col-md-4 mb-3">
                <div class="card bg-success text-white shadow-sm p-3 border-0">
                    <h5 class="fw-normal">Tổng Thu (+)</h5>
                    <h3 id="total-income" class="fw-bold">0đ</h3>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card bg-danger text-white shadow-sm p-3 border-0">
                    <h5 class="fw-normal">Tổng Chi (-)</h5>
                    <h3 id="total-expense" class="fw-bold">0đ</h3>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card bg-primary text-white shadow-sm p-3 border-0">
                    <h5 class="fw-normal">Số Dư Hiện Tại</h5>
                    <h3 id="balance" class="fw-bold">0đ</h3>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-12">
                <div class="card p-3 shadow-sm border-0">
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-secondary fw-medium">Tỷ lệ chi tiêu trên tổng thu nhập:</span>
                        <span id="percent-text" class="fw-bold text-dark">0%</span>
                    </div>
                    <div class="progress" style="height: 12px; border-radius: 10px; background-color: #e9ecef;">
                        <div id="budget-progress" class="progress-bar progress-bar-striped progress-bar-animated bg-info" 
                             role="progressbar" style="width: 0%; border-radius: 10px;"></div>
                    </div>
                    <small id="alert-msg" class="mt-2 fw-medium text-success text-center">✅ Bạn vẫn đang kiểm soát tốt chi tiêu.</small>
                </div>
            </div>
        </div>


        <div class="row mb-4">
            <div class="col-12">
                <div class="card p-4 shadow-sm border-0">
                    <h5 class="fw-bold mb-3"><i class="bi bi-bar-chart-fill me-2"></i>Xu hướng chi tiêu theo tháng</h5>
                    <div style="max-height: 300px; position: relative; width: 100%;">
                        <canvas id="myChart"></canvas>
                    </div>
                </div>
            </div>
        </div>


        <section class="card p-4 shadow-sm mb-4 border-0">
            <h5 class="mb-3 fw-bold"><i class="bi bi-plus-circle-fill me-2"></i>Thêm Giao Dịch Mới</h5>
            <form id="finance-form" class="row g-3">
                <div class="col-md-2">
                    <select id="type" class="form-select border-primary-subtle">
                        <option value="expense">Chi tiền (-)</option>
                        <option value="income">Thu tiền (+)</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <input type="text" id="description" class="form-control border-primary-subtle" placeholder="Ví dụ: Mua giáo trình, Tiền lương..." required>
                </div>
                <div class="col-md-2">
                    <input type="number" id="amount" class="form-control border-primary-subtle" placeholder="Số tiền" required>
                </div>
                <div class="col-md-2">
                    <select id="category" class="form-select border-primary-subtle">
                        <option value="food">Ăn uống</option>
                        <option value="transport">Di chuyển</option>
                        <option value="study">Học tập</option>
                        <option value="entertainment">Giải trí</option>
                        <option value="other">Khác</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-primary w-100 fw-bold">THÊM</button>
                </div>
            </form>
        </section>

        <section class="card shadow-sm overflow-hidden border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="ps-4">Nội dung</th>
                            <th>Số tiền (VNĐ)</th>
                            <th>Danh mục</th>
                            <th class="text-center pe-4">Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="transaction-list">
                        </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
