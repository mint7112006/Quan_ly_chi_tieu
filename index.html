<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chào mừng bạn đến với Nhóm 6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .welcome-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .btn-start {
            background-color: #ffde59;
            color: #333;
            font-weight: bold;
            padding: 12px 40px;
            border-radius: 30px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
        }
        .btn-start:hover {
            transform: scale(1.1);
            background-color: #fff;
            color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="welcome-card">
        <h1 class="display-3 fw-bold mb-3">💰 Nhóm 6</h1>
        <p class="lead mb-4">Chào mừng <b>Bạn</b> đã quay trở lại!<br>Bắt đầu quản lý tài chính thông minh ngay hôm nay.</p>
        <a href="app.html" class="btn-start">KHÁM PHÁ NGAY</a>
        <div class="mt-4 small opacity-75">Học viện Công nghệ Bưu chính Viễn thông (PTIT)</div>
    </div>
</body>
</html>
