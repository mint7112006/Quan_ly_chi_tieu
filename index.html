<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chào mừng bạn đến với Nhóm 4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            /* Tông màu Lavender chủ đạo từ mẫu UI */
            background: linear-gradient(135deg, #f3f0ff 0%, #e0d7ff 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            overflow: hidden;
        }

        /* Trang trí thêm vài vòng tròn màu pastel cho giống mẫu */
        body::before, body::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            z-index: -1;
        }
        body::before {
            width: 300px; height: 300px;
            background: rgba(124, 58, 237, 0.1);
            top: -50px; left: -50px;
        }
        body::after {
            width: 200px; height: 200px;
            background: rgba(251, 146, 60, 0.1);
            bottom: 50px; right: 50px;
        }

        .welcome-card {
            /* Hiệu ứng kính mờ Glassmorphism */
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px; /* Bo góc cực đại theo mẫu */
            padding: 60px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            text-align: center;
            box-shadow: 0 20px 40px rgba(124, 58, 237, 0.1);
            max-width: 600px;
            width: 90%;
        }

        h1 {
            color: #7c3aed; /* Màu tím đậm cho tiêu đề */
            font-weight: 700;
            margin-bottom: 20px;
        }

        p {
            color: #4b5563;
            font-size: 1.1rem;
        }

        b {
            color: #fb923c; /* Tên Hằng màu cam đất nổi bật */
        }

        .btn-start {
            /* Nút bấm màu Cam đất Pastel */
            background-color: #fb923c;
            color: white;
            font-weight: 600;
            padding: 15px 45px;
            border-radius: 20px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 30px;
            box-shadow: 0 10px 20px rgba(251, 146, 60, 0.3);
            border: none;
        }

        .btn-start:hover {
            transform: translateY(-5px);
            background-color: #f97316;
            color: white;
            box-shadow: 0 15px 25px rgba(251, 146, 60, 0.4);
        }

        .ptit-tag {
            margin-top: 40px;
            font-size: 0.85rem;
            color: #9ca3af;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="welcome-card">
        <div class="brand-container">
            
            <h1 class="brand-title">💰Nhóm 4</h1>
        </div>
    
        <p class="mb-4 text-secondary">Chào mừng <b>Bạn</b> đã quay trở lại!<br>Bắt đầu quản lý tài chính thông minh ngay hôm nay.</p>
    
        <a href="app.html" class="btn-start">KHÁM PHÁ NGAY</a>
    
        <div class="ptit-tag">
            Học viện Công nghệ Bưu chính Viễn thông
        </div>
    </div>
</body>
</html>
